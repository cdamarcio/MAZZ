<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZZ Concursos - Concursos Públicos Abertos e Previstos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>MAZZ<span>Concursos</span></h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#" class="active" data-section="nacional">Nacional</a></li>
                    <li><a href="#" data-section="estados">Estados</a></li>
                    <li><a href="#" data-section="municipios">Municípios</a></li>
                </ul>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar concursos...">
                <button onclick="searchConcursos()">🔍</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h2 id="pageTitle">Concursos Nacionais</h2>
            <p>Concursos Públicos Abertos e Previstos em todo o Brasil</p>
        </div>
    </section>

    <!-- Sub Navigation (Apenas GO, MA, PA, TO) -->
    <nav class="sub-nav" id="estadosNav" style="display: none;">
        <div class="container">
            <ul>
                <li><a href="#" data-estado="GO">GO</a></li>
                <li><a href="#" data-estado="MA">MA</a></li>
                <li><a href="#" data-estado="PA">PA</a></li>
                <li><a href="#" data-estado="TO">TO</a></li>
            </ul>
        </div>
    </nav>

    <!-- Filters -->
    <section class="filters">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="abertos">Abertos</button>
                <button class="filter-btn" data-filter="previstos">Previstos</button>
                <button class="filter-btn" data-filter="encerrados">Encerrados</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="totalAbertos">0</span>
                    <span class="stat-label">Abertos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalPrevistos">0</span>
                    <span class="stat-label">Previstos</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalEncerrados">0</span>
                    <span class="stat-label">Encerrados</span>
                </div>
            </div>

            <!-- Concursos List -->
            <div class="concursos-grid" id="concursosList">
                <!-- Concursos serão inseridos aqui via JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MAZZ Concursos. Todos os direitos reservados.</p>
            <p>Goiânia-GO. (62) 99646-6033</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>

        <!-- Botão Flutuante WhatsApp -->

</body>
</html>
